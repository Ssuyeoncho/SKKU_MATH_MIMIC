<!DOCTYPE html>
<html lang="ko">
  <head>
    {% include site-head.html %}
    <style>
      .seminar-browser {
        grid-template-columns: minmax(220px, 310px) 1fr;
        grid-template-areas: "sidebar content";
      }

      .seminar-browser .seminar-sidebar {
        grid-area: sidebar;
      }

      .seminar-content {
        grid-area: content;
        padding: 6rem 4rem 3rem;
      }

      .seminar-content p {
        max-width: 48rem;
        font-size: 1.1rem;
        color: var(--content-muted);
      }

      .seminar-content h2 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .detail-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }

      .content-eyebrow {
        display: inline-block;
        margin-bottom: 1rem;
        color: var(--sidebar-accent);
        font-weight: 700;
      }

      .seminar-language-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem;
        border: 1px solid var(--sidebar-border);
        border-radius: 999px;
        background: var(--panel-bg);
      }

      .language-button {
        border: 0;
        background: transparent;
        color: var(--content-muted);
        font: inherit;
        font-weight: 700;
        padding: 0.45rem 0.95rem;
        border-radius: 999px;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .language-button.is-active {
        background: var(--sidebar-accent);
        color: var(--bg-primary);
      }

      .seminar-lang-panel {
        display: grid;
        gap: 0.85rem;
      }

      .seminar-lang-panel h2 {
        margin: 0.15rem 0 0.45rem;
      }

      .seminar-key-list {
        margin: 0.15rem 0 0.45rem;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.6rem;
      }

      .seminar-key-list li {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex-wrap: wrap;
        margin: 0;
      }

      .seminar-key-label {
        display: inline-flex;
        align-items: center;
        padding: 0.24rem 0.62rem;
        border-radius: 999px;
        background: var(--sidebar-hover);
        border: 1px solid var(--sidebar-border);
        color: var(--sidebar-accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .seminar-key-value {
        font-size: 1.06rem;
        color: var(--sidebar-accent);
        font-weight: 800;
      }

      .seminar-lang-panel[hidden] {
        display: none;
      }

      .back-home {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.55rem 0.85rem;
        border: 1px solid var(--sidebar-border);
        border-radius: 999px;
        background: var(--panel-bg);
        color: var(--text-color);
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .seminar-browser {
          grid-template-areas:
            "content"
            "sidebar";
        }

        .seminar-content {
          padding: 2.4rem 0.7rem 2rem;
        }

        .seminar-content h2 {
          font-size: 2.15rem;
          line-height: 1.2;
        }

        .seminar-content p {
          font-size: 1rem;
          line-height: 1.7;
        }

        .seminar-key-value {
          font-size: 1rem;
        }

        .detail-toolbar {
          margin-bottom: 1rem;
        }
      }

      @media (max-width: 600px) {
        .seminar-language-toggle {
          padding: 0.22rem;
          gap: 0.3rem;
        }

        .language-button {
          font-size: 0.84rem;
          padding: 0.38rem 0.78rem;
        }
      }
    </style>
  </head>
  <body class="seminar-page">
    {% include site-navbar.html active="seminars" %}

    <main class="seminar-shell seminar-browser">
      {% include seminar-sidebar.html current_path='' %}

      <section class="seminar-content">
        {{ content }}
      </section>
    </main>

    <script src="{{ '/js/seminar-language-toggle.js' | relative_url }}"></script>
    <script src="{{ '/js/seminar-sidebar.js' | relative_url }}"></script>
    <script src="{{ '/js/script.js' | relative_url }}"></script>
  </body>
</html>
