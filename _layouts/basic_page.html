<!DOCTYPE html>
<html lang="ko">
  <head>
    {% include site-head.html %}
    <style>
      body.basic-page {
        min-height: 100vh;
        background: var(--page-bg);
      }

      .basic-page .navbar .nav-link.is-active {
        color: var(--sidebar-accent);
      }

      .page-content {
        max-width: 1040px;
        margin: 0 auto;
        padding: 7rem 2.5rem 4.5rem;
      }

      .page-header {
        display: grid;
        gap: 1rem;
        margin-bottom: 2.8rem;
      }

      .page-header-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 2rem;
      }

      .page-header-copy {
        display: grid;
        gap: 0.95rem;
        min-width: 0;
        max-width: 42rem;
      }

      .page-content h1 {
        font-size: clamp(3rem, 6.5vw, 4.6rem);
        margin: 0;
        line-height: 0.98;
        letter-spacing: -0.03em;
        text-align: left;
      }

      .page-content p {
        max-width: 42rem;
        font-size: 1.04rem;
        line-height: 1.62;
        color: var(--content-muted);
      }

      .page-header-copy > p {
        width: min(100%, 42rem);
        margin: 0;
      }

      .localized-fixed {
        position: relative;
        display: block;
      }

      .localized-fixed-inline {
        display: inline-block;
      }

      .localized-fixed-sizer {
        display: block;
        visibility: hidden;
        white-space: inherit;
      }

      .localized-fixed-text {
        position: absolute;
        inset: 0;
        display: block;
        white-space: inherit;
      }

      .news-archive {
        display: grid;
        gap: 3rem;
        margin-top: 0.4rem;
      }

      .news-year-group {
        display: grid;
        gap: 0.55rem;
      }

      .news-year-group + .news-year-group {
        padding-top: 1.6rem;
        border-top: 1px solid var(--sidebar-border);
      }

      .news-year-heading {
        margin: 0;
        font-size: 0.88rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--content-subtle);
      }

      .news-meta {
        margin: 0 0 0.65rem;
        font-size: 0.98rem;
        color: var(--content-subtle);
      }

      .news-section {
        margin-top: 1.4rem;
      }

      .news-section h2 {
        font-size: 1.45rem;
        margin-bottom: 0.75rem;
      }

      .news-gallery {
        margin-top: 1.2rem;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
      }

      .news-gallery img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--sidebar-border);
        background: var(--panel-bg);
      }

      .news-link-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0;
      }

      .news-link-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 15rem;
        align-items: end;
        gap: 1.5rem;
        padding: 1.15rem 0;
        border-radius: 0;
        border: 0;
        background: transparent;
      }

      .news-link-main {
        display: grid;
        gap: 0.08rem;
        min-width: 0;
      }

      .news-link-title {
        font-weight: 700;
        font-size: 1.18rem;
        line-height: 1.28;
        letter-spacing: -0.015em;
        color: var(--text-color);
      }

      .news-link-title .localized-fixed-sizer,
      .news-link-title .localized-fixed-text {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }

      .news-link-date {
        font-size: 0.96rem;
        font-weight: 500;
        color: var(--content-muted);
        white-space: nowrap;
        text-align: right;
      }

      .news-link-period {
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--content-subtle);
        letter-spacing: 0.02em;
      }

      .news-link-row:hover .news-link-title,
      .news-link-row:focus-visible .news-link-title {
        color: var(--sidebar-accent);
      }

      .news-link-list li + li {
        border-top: 1px solid var(--sidebar-border);
      }

      @media (max-width: 900px) {
        .news-gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .page-content {
          padding: 6.2rem 1.1rem 3rem;
        }

        .page-header {
          gap: 1rem;
        }

        .page-header-row {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .page-header-copy {
          gap: 0.7rem;
          max-width: none;
        }

        .page-content h1 {
          font-size: 2.6rem;
        }

        .page-header-copy > p {
          width: 100%;
        }

        .news-gallery {
          grid-template-columns: 1fr;
        }

        .news-gallery img {
          height: 200px;
        }

        .news-link-row {
          grid-template-columns: 1fr;
          align-items: start;
          gap: 0.35rem;
          padding: 1rem 0;
        }
      }
    </style>
  </head>
  <body class="basic-page">
    {% include site-navbar.html active=page.nav_active %}

    <main class="page-content">
      {% if page.page_heading %}
      <h1>{{ page.page_heading }}</h1>
      {% endif %}
      {{ content }}
    </main>

    {% include site-footer.html %}
    <script src="{{ '/js/seminar-language-toggle.js' | relative_url }}"></script>
    <script src="{{ '/js/script.js' | relative_url }}"></script>
  </body>
</html>
