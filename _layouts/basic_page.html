<!DOCTYPE html>
<html lang="ko">
  <head>
    {% include site-head.html %}
    <style>
      body.basic-page {
        min-height: 100vh;
        background: var(--page-bg);
      }

      .basic-page .navbar .nav-link.is-active {
        color: var(--sidebar-accent);
      }

      .page-content {
        max-width: 960px;
        margin: 0 auto;
        padding: 7rem 2rem 4rem;
      }

      .page-header {
        display: grid;
        gap: 1.4rem;
        margin-bottom: 1.25rem;
      }

      .page-header-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: 1rem;
      }

      .page-header-spacer {
        min-width: 0;
      }

      .seminar-language-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem;
        border: 1px solid var(--sidebar-border);
        border-radius: 999px;
        background: var(--panel-bg);
      }

      .language-button {
        border: 0;
        background: transparent;
        color: var(--content-muted);
        font: inherit;
        font-weight: 700;
        padding: 0.45rem 0.95rem;
        border-radius: 999px;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .language-button.is-active {
        background: var(--sidebar-accent);
        color: var(--bg-primary);
      }

      .page-content h1 {
        font-size: 3rem;
        margin: 0;
        text-align: center;
      }

      .page-content p {
        max-width: 42rem;
        font-size: 1.1rem;
        color: var(--content-muted);
      }

      .page-header > p {
        width: min(100%, 42rem);
        margin: 0 auto;
      }

      .news-archive {
        display: grid;
        gap: 1.5rem;
        margin-top: 1.6rem;
      }

      .news-year-group {
        display: grid;
        gap: 0.7rem;
      }

      .news-year-heading {
        margin: 0;
        font-size: 0.92rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--content-subtle);
      }

      .news-meta {
        margin: 0 0 0.65rem;
        font-size: 0.98rem;
        color: var(--content-subtle);
      }

      .news-section {
        margin-top: 1.4rem;
      }

      .news-section h2 {
        font-size: 1.45rem;
        margin-bottom: 0.75rem;
      }

      .news-gallery {
        margin-top: 1.2rem;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.7rem;
      }

      .news-gallery img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--sidebar-border);
        background: var(--panel-bg);
      }

      .news-link-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.7rem;
      }

      .news-link-list a {
        display: block;
        padding: 0.78rem 0.95rem;
        border-radius: 12px;
        border: 1px solid var(--sidebar-border);
        background: var(--panel-bg);
      }

      .news-link-content {
        display: grid;
        gap: 0.32rem;
      }

      .news-link-title {
        font-weight: 700;
      }

      .news-link-meta-row {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      .news-link-date {
        font-size: 0.92rem;
        font-weight: 500;
        color: var(--content-muted);
      }

      .news-link-period {
        display: inline-flex;
        align-items: center;
        padding: 0.18rem 0.52rem;
        border-radius: 999px;
        background: var(--sidebar-hover);
        border: 1px solid var(--sidebar-border);
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--sidebar-accent);
      }

      .news-link-list a:hover,
      .news-link-list a:focus-visible {
        border-color: var(--sidebar-accent);
      }

      @media (max-width: 900px) {
        .news-gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .page-content {
          padding: 6.2rem 1rem 3rem;
        }

        .page-header {
          gap: 1rem;
        }

        .page-header-row {
          grid-template-columns: 1fr;
          justify-items: center;
        }

        .page-header-spacer {
          display: none;
        }

        .page-content h1 {
          font-size: 2.2rem;
        }

        .page-header > p {
          width: 100%;
        }

        .news-gallery {
          grid-template-columns: 1fr;
        }

        .news-gallery img {
          height: 200px;
        }

        .news-link-meta-row {
          gap: 0.4rem;
        }

        .seminar-language-toggle {
          padding: 0.22rem;
          gap: 0.3rem;
        }

        .language-button {
          font-size: 0.84rem;
          padding: 0.38rem 0.78rem;
        }
      }
    </style>
  </head>
  <body class="basic-page">
    {% include site-navbar.html active=page.nav_active %}

    <main class="page-content">
      {% if page.page_heading %}
      <h1>{{ page.page_heading }}</h1>
      {% endif %}
      {{ content }}
    </main>

    {% include site-footer.html %}
    {% if page.enable_language_toggle %}
    <script src="{{ '/js/seminar-language-toggle.js' | relative_url }}"></script>
    {% endif %}
    <script src="{{ '/js/script.js' | relative_url }}"></script>
  </body>
</html>
