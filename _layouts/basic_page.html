<!DOCTYPE html>
<html lang="ko">
  <head>
    {% include site-head.html %}
    <style>
      body.basic-page {
        min-height: 100vh;
        background: #fbfbfd;
      }

      .basic-page .navbar .nav-link.is-active {
        color: #1c6b42;
      }

      .page-content {
        max-width: 960px;
        margin: 0 auto;
        padding: 7rem 2rem 4rem;
      }

      .page-content h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .page-content p {
        max-width: 42rem;
        font-size: 1.1rem;
        color: #56525f;
      }
    </style>
  </head>
  <body class="basic-page">
    {% include site-navbar.html active=page.nav_active %}

    <main class="page-content">
      {% if page.page_heading %}
      <h1>{{ page.page_heading }}</h1>
      {% endif %}
      {{ content }}
    </main>

    <script src="{{ '/js/script.js' | relative_url }}"></script>
  </body>
</html>
