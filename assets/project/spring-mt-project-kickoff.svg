<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#166534"/>
  <!-- sky gradient via shapes -->
  <rect width="800" height="350" fill="#0d4a26"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.8" opacity="0.7"/>
    <circle cx="150" cy="40" r="1.2" opacity="0.5"/>
    <circle cx="220" cy="90" r="2" opacity="0.65"/>
    <circle cx="310" cy="50" r="1.5" opacity="0.6"/>
    <circle cx="380" cy="30" r="1" opacity="0.4"/>
    <circle cx="460" cy="75" r="1.8" opacity="0.7"/>
    <circle cx="540" cy="45" r="1.2" opacity="0.5"/>
    <circle cx="610" cy="85" r="2" opacity="0.6"/>
    <circle cx="690" cy="55" r="1.5" opacity="0.55"/>
    <circle cx="730" cy="100" r="1" opacity="0.4"/>
    <circle cx="120" cy="120" r="1" opacity="0.35"/>
    <circle cx="500" cy="110" r="1.2" opacity="0.4"/>
    <circle cx="660" cy="130" r="1" opacity="0.35"/>
  </g>
  <!-- moon -->
  <circle cx="640" cy="110" r="42" fill="#ffcd42" opacity="0.82"/>
  <circle cx="660" cy="98" r="34" fill="#0d4a26" opacity="0.6"/>
  <!-- mountains back -->
  <polygon points="0,420 180,160 360,420" fill="#1a5c38" opacity="0.9"/>
  <polygon points="200,420 440,140 680,420" fill="#1c6b42" opacity="0.95"/>
  <polygon points="440,420 640,200 800,420" fill="#155730" opacity="0.85"/>
  <!-- mountains front -->
  <polygon points="0,600 140,350 280,600" fill="#0f3d20"/>
  <polygon points="100,600 300,380 500,600" fill="#123826"/>
  <polygon points="380,600 560,340 740,600" fill="#0e3620"/>
  <polygon points="600,600 750,400 900,600" fill="#102e1a"/>
  <!-- ground -->
  <rect x="0" y="520" width="800" height="80" fill="#0a2e14"/>
</svg>
