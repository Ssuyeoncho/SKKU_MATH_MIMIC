<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seminars | SKKU MATH MIMIC</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon/favicon-32x32.png"
    />
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/utilities.css" />
    <style>
      :root {
        --sidebar-border: #dbd9e2;
        --sidebar-text: #56525f;
        --sidebar-accent: #1c6b42;
        --sidebar-hover: #eef6f0;
        --page-bg: #fbfbfd;
      }

      body {
        min-height: 100vh;
        background: var(--page-bg);
      }

      .navbar .nav-link.is-active {
        color: var(--sidebar-accent);
      }

      .seminar-browser {
        display: grid;
        grid-template-columns: minmax(220px, 310px) 1fr;
        margin-top: 80px;
        min-height: calc(100vh - 80px);
      }

      .seminar-sidebar {
        border-right: 1px solid var(--sidebar-border);
        background: #fbfbfd;
      }

      .seminar-sidebar-header {
        padding: 1.5rem 1.5rem 1rem;
        border-bottom: 1px solid var(--sidebar-border);
      }

      .seminar-sidebar-header h1 {
        font-size: 1.05rem;
        letter-spacing: 0.04em;
      }

      .season-list {
        padding: 0;
        margin: 0;
      }

      .season {
        border-bottom: 1px solid var(--sidebar-border);
      }

      .season-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.25rem 1.5rem 1.25rem 2rem;
        padding-left: 1.5rem;
        border: 0;
        background: transparent;
        font: inherit;
        color: var(--sidebar-accent);
        cursor: pointer;
      }

      .season-toggle span:first-child {
        font-size: 0.92rem;
        font-weight: 600;
      }

      .season-icon {
        width: 2.3rem;
        height: 2.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #c8c3d7;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff 0%, #eef6f0 100%);
        box-shadow: 0 8px 20px rgba(28, 107, 66, 0.12);
        color: var(--sidebar-accent);
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1;
        flex-shrink: 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .season-toggle:hover .season-icon {
        transform: translateY(-1px);
        border-color: #6da985;
        box-shadow: 0 12px 24px rgba(28, 107, 66, 0.18);
      }

      .season-items {
        list-style: none;
        margin: 0;
        padding: 0 0 1rem;
      }

      .season-item {
        display: block;
        margin: 0;
      }

      .season-link {
        display: block;
        padding: 0.55rem 1.25rem 0.55rem 1.5rem;
        color: var(--sidebar-text);
        font-size: 0.92rem;
        line-height: 1.45;
        text-decoration: none;
      }

      .season-link.is-current,
      .season-link:hover {
        background: var(--sidebar-hover);
      }

      .season-link.is-current {
        font-weight: 700;
      }

      .seminar-content {
        padding: 6rem 4rem 3rem;
      }

      .seminar-content p {
        max-width: 48rem;
        font-size: 1.1rem;
        color: #56525f;
      }

      .seminar-content h2 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .content-eyebrow {
        display: inline-block;
        margin-bottom: 1rem;
        color: var(--sidebar-accent);
        font-weight: 700;
      }

      .back-home {
        display: inline-block;
        margin-top: 2rem;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .seminar-browser {
          grid-template-columns: 1fr;
        }

        .seminar-sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--sidebar-border);
        }

        .seminar-content {
          padding: 3rem 2rem;
        }

        .season-toggle {
          padding-left: 1.25rem;
        }

        .season-link {
          padding-left: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <h1 id="logo">
          <a href="../index.html"><img src="../assets/logo.png" alt="MIMIC logo" /></a>
        </h1>
        <ul class="nav-menu">
          <li><a class="nav-link" href="../index.html">MAIN</a></li>
          <li><a class="nav-link is-active" href="index.html">SEMINARS</a></li>
          <li><a class="nav-link" href="../conferences/index.html">CONFERENCES</a></li>
          <li><a class="nav-link" href="../contact/index.html">CONTACT</a></li>
          <div class="theme-switch">
            <input type="checkbox" id="switch" />
            <label class="toggle-icons" for="switch">
              <img class="moon" src="../assets/moon.svg" alt="Dark mode" />
              <img class="sun" src="../assets/sun.svg" alt="Light mode" />
            </label>
          </div>
        </ul>
        <div class="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
      </div>
    </nav>

    <main class="seminar-browser">
      <aside
        class="seminar-sidebar"
        data-seminar-sidebar
        data-base-path=""
        data-current-path=""
      ></aside>

      <section class="seminar-content">
        <span class="content-eyebrow">Seminar Archive</span>
        <h2>Browse by semester</h2>
        <p>
          왼쪽 목록에서 학기를 펼치면 해당 세미나 제목들이 나타나도록 구성했습니다.
          현재는 2025 Fall만 예시 데이터를 넣었고, 첫 번째 항목인
          <strong>1+1=0</strong>은 기존 상세 페이지로 연결됩니다.
        </p>
        <p>
          이후에는 각 제목을 개별 세미나 페이지로 연결하거나, 이 화면 오른쪽 영역에
          요약 내용을 바로 보여주도록 확장할 수 있습니다.
        </p>
        <a class="back-home" href="../index.html#seminars">Back to home</a>
      </section>
    </main>

    <script src="../js/seminar-sidebar.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
